<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vasoactive Breakout — 10 Design Options</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #0c0f14; color: #e7eef6; padding: 32px 20px 64px;
  }
  .page-head { max-width: 1200px; margin: 0 auto 28px; }
  .page-head h1 { font-size: 26px; letter-spacing: .2px; }
  .page-head p { color: #93a3b5; margin-top: 6px; font-size: 14px; }
  .grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 26px;
  }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  .tile { display: flex; flex-direction: column; gap: 10px; }
  .frame {
    border-radius: 14px; overflow: hidden; height: 340px;
    border: 1px solid #222c38; box-shadow: 0 14px 40px rgba(0,0,0,.4);
    position: relative;
  }
  .cap { padding: 2px 2px 0; }
  .cap .n { font-weight: 800; font-size: 15px; }
  .cap .n b { color: #36d1c4; }
  .cap .d { color: #93a3b5; font-size: 13px; line-height: 1.45; margin-top: 3px; }
  .cap .u { color: #6f8194; font-size: 12px; margin-top: 4px; font-style: italic; }

  /* generic mock scaffold inside each frame */
  .mock { width: 100%; height: 100%; display: flex; flex-direction: column; font-size: 12px; }
  .bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; }
  .dot { width: 22px; height: 22px; border-radius: 7px; display: grid; place-items: center; font-weight: 900; }
  .hearts { letter-spacing: 2px; font-size: 13px; }
  .body { flex: 1; padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .eye { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
  .h2 { font-size: 16px; font-weight: 800; line-height: 1.15; }
  .vig { font-size: 11px; line-height: 1.5; }
  .field { display: flex; gap: 8px; margin-top: auto; }
  .inp { flex: 1; border-radius: 9px; padding: 9px 11px; font-size: 11px; }
  .btn { border-radius: 9px; padding: 9px 14px; font-weight: 800; font-size: 11px; white-space: nowrap; }
  .pill { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 9px; font-weight: 700; }

  /* 1 ICU MONITOR (current) */
  .t1 .mock { background: linear-gradient(180deg,#131d2b,#0f1722); }
  .t1 .bar { border-bottom: 1px solid #21344a; }
  .t1 .dot { background: linear-gradient(135deg,#36d1c4,#1fb6a6); color:#052420; }
  .t1 .eye { color:#36d1c4; }
  .t1 .card { background:#18253550; border:1px solid #21344a; border-left:3px solid #1fb6a6; border-radius:10px; padding:11px 13px; }
  .t1 .inp { background:#0b1420; border:1px solid #21344a; color:#e7eef6; }
  .t1 .btn { background: linear-gradient(135deg,#36d1c4,#1fb6a6); color:#052420; }
  .t1 .hearts { color:#ff5a6e; }

  /* 2 CLEAN CLINICAL LIGHT */
  .t2 .mock { background:#f4f7fb; color:#1f2a37; }
  .t2 .bar { background:#fff; border-bottom:1px solid #e2e8f0; }
  .t2 .dot { background:#1d6fe0; color:#fff; }
  .t2 .eye { color:#1d6fe0; }
  .t2 .card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:11px 13px; box-shadow:0 4px 14px rgba(20,40,80,.06); }
  .t2 .vig, .t2 .h2 { color:#1f2a37; }
  .t2 .inp { background:#fff; border:1px solid #cbd5e1; color:#1f2a37; }
  .t2 .btn { background:#1d6fe0; color:#fff; }
  .t2 .hearts { color:#e0476b; }

  /* 3 TERMINAL / HACKER */
  .t3 .mock { background:#05080a; color:#7CFC9B; font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
  .t3 .bar { border-bottom:1px dashed #1c3a26; }
  .t3 .dot { background:#0c1f14; color:#7CFC9B; border:1px solid #1c3a26; }
  .t3 .eye { color:#3ddc84; }
  .t3 .card { border:1px solid #14361f; border-radius:4px; padding:11px 13px; background:#070d09; }
  .t3 .h2 { color:#b9ffcf; }
  .t3 .vig { color:#5fae77; }
  .t3 .inp { background:#000; border:1px solid #1c3a26; color:#7CFC9B; font-family:inherit; }
  .t3 .btn { background:#0c1f14; color:#7CFC9B; border:1px solid #3ddc84; border-radius:4px; }
  .t3 .hearts { color:#3ddc84; }
  .t3 .h2::before { content:"> "; }

  /* 4 CINEMATIC DARK */
  .t4 .mock { background:radial-gradient(120% 90% at 70% -10%, #3a1330 0%, #0a0710 55%); }
  .t4 .bar { }
  .t4 .dot { background:linear-gradient(135deg,#ff5e7e,#b3164a); color:#fff; }
  .t4 .eye { color:#ff8aa6; letter-spacing:4px; }
  .t4 .h2 { font-size:22px; text-shadow:0 2px 20px rgba(255,90,126,.4); }
  .t4 .card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:11px 13px; backdrop-filter: blur(4px); }
  .t4 .vig { color:#d9c3d2; }
  .t4 .inp { background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.15); color:#fff; }
  .t4 .btn { background:linear-gradient(135deg,#ff5e7e,#b3164a); color:#fff; }
  .t4 .hearts { color:#ff5e7e; }

  /* 5 VAULT / SAFECRACKER */
  .t5 .mock { background:linear-gradient(180deg,#10182b,#0b1020); color:#f0e6cf; }
  .t5 .bar { border-bottom:1px solid #2a3454; }
  .t5 .dot { background:radial-gradient(circle at 35% 30%,#f6d77a,#b8860b); color:#3a2a05; border-radius:50%; }
  .t5 .eye { color:#e7c873; }
  .t5 .card { background:#0e1530; border:1px solid #2a3454; border-radius:10px; padding:11px 13px; position:relative; }
  .t5 .dialwrap { display:flex; align-items:center; gap:10px; }
  .t5 .dial { width:46px; height:46px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#f6d77a,#9a6f0a); border:3px solid #5a4a1e; box-shadow:inset 0 0 8px rgba(0,0,0,.5); }
  .t5 .h2 { color:#f4ecd6; }
  .t5 .vig { color:#c8bd9f; }
  .t5 .inp { background:#0a1124; border:1px solid #3a466e; color:#f0e6cf; letter-spacing:3px; }
  .t5 .btn { background:linear-gradient(135deg,#f6d77a,#b8860b); color:#3a2a05; }
  .t5 .hearts { color:#e7c873; }

  /* 6 ARCADE / GAMIFIED */
  .t6 .mock { background:linear-gradient(180deg,#1a1140,#241060); color:#fff; }
  .t6 .bar { border-bottom:2px solid #ff3df0; }
  .t6 .dot { background:linear-gradient(135deg,#ffe14d,#ff3df0); color:#2a1060; border-radius:8px; }
  .t6 .eye { color:#ffe14d; }
  .t6 .h2 { font-size:18px; color:#fff; text-shadow:2px 2px 0 #ff3df0; }
  .t6 .card { background:#2a1668; border:2px solid #00e5ff; border-radius:14px; padding:11px 13px; box-shadow:0 0 18px rgba(0,229,255,.35); }
  .t6 .vig { color:#cdbdfa; }
  .t6 .inp { background:#1a0f4a; border:2px solid #7a5cff; color:#fff; border-radius:10px; }
  .t6 .btn { background:linear-gradient(135deg,#ffe14d,#ff8a00); color:#2a1060; border-radius:10px; box-shadow:0 3px 0 #b35c00; }
  .t6 .hearts { color:#ff3df0; }
  .t6 .pill { background:#00e5ff; color:#06283a; }

  /* 7 MINIMAL MONO */
  .t7 .mock { background:#fafafa; color:#111; }
  .t7 .bar { border-bottom:1px solid #ececec; }
  .t7 .dot { background:#111; color:#fff; border-radius:4px; }
  .t7 .eye { color:#888; }
  .t7 .h2 { font-weight:800; letter-spacing:-.4px; }
  .t7 .card { border:1px solid #e6e6e6; border-radius:8px; padding:12px 14px; }
  .t7 .vig { color:#555; }
  .t7 .inp { background:#fff; border:1px solid #ddd; color:#111; }
  .t7 .btn { background:#111; color:#fff; }
  .t7 .hearts { color:#111; filter:grayscale(1); }

  /* 8 CARD DECK / KANBAN */
  .t8 .mock { background:#11161d; }
  .t8 .bar { border-bottom:1px solid #243; border-bottom:1px solid #243140; }
  .t8 .dot { background:#22c55e; color:#04210f; }
  .t8 .eye { color:#22c55e; }
  .t8 .cols { display:flex; gap:8px; flex:1; min-height:0; }
  .t8 .col { flex:1; background:#161d27; border:1px solid #243140; border-radius:9px; padding:8px; display:flex; flex-direction:column; gap:6px; }
  .t8 .col h4 { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:#7d8ea0; }
  .t8 .lk { background:#1e2733; border:1px solid #2c3a4a; border-radius:6px; padding:6px 7px; font-size:9px; }
  .t8 .lk.done { border-left:3px solid #22c55e; }
  .t8 .lk.cur { border-left:3px solid #36d1c4; }
  .t8 .hearts { color:#ff5a6e; }

  /* 9 GLASSMORPHISM */
  .t9 .mock { background:linear-gradient(135deg,#5b3df0 0%,#1fb6c8 100%); color:#fff; }
  .t9 .bar { }
  .t9 .dot { background:rgba(255,255,255,.25); color:#fff; border:1px solid rgba(255,255,255,.4); }
  .t9 .eye { color:rgba(255,255,255,.85); }
  .t9 .card { background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.3); border-radius:14px; padding:11px 13px; backdrop-filter:blur(8px); box-shadow:0 8px 30px rgba(0,0,0,.2); }
  .t9 .vig { color:rgba(255,255,255,.9); }
  .t9 .inp { background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.35); color:#fff; }
  .t9 .btn { background:#fff; color:#5b3df0; }
  .t9 .hearts { color:#fff; }

  /* 10 MEDICAL CHART / PAPER */
  .t10 .mock { background:#f6f3ea; color:#2b2a25; font-family: Georgia, 'Times New Roman', serif; }
  .t10 .bar { border-bottom:2px solid #c9b89a; background:#efe9d8; }
  .t10 .dot { background:#b23b3b; color:#fff; border-radius:4px; font-family:sans-serif; }
  .t10 .eye { color:#9a7b3f; font-family:sans-serif; }
  .t10 .card { background:#fffdf6; border:1px solid #d9ccab; border-radius:4px; padding:18px 13px 11px; box-shadow:2px 2px 0 #e7ddc5; position:relative; }
  .t10 .card::before { content:"PATIENT CHART"; position:absolute; top:6px; right:10px; font-family:sans-serif; font-size:8px; letter-spacing:1.5px; color:#b08a52; font-weight:700; }
  .t10 .h2 { color:#3a2f1d; }
  .t10 .vig { color:#5b5341; }
  .t10 .inp { background:#fff; border:1px solid #cbbd99; color:#2b2a25; font-family:sans-serif; }
  .t10 .btn { background:#b23b3b; color:#fff; font-family:sans-serif; }
  .t10 .hearts { color:#b23b3b; }
</style>
</head>
<body>
  <div class="page-head">
    <h1>Unlock Me If You Can — 10 Design Options</h1>
    <p>Same game, ten visual directions. Each preview shows the level / lock screen. Pick a number and I'll apply it to the live app.</p>
  </div>

  <div class="grid" id="grid"></div>

<script>
  const VIG = "Ina's BP slides: 88/44, MAP 58. While the CVAD is prepped, what is the first-line agent to stabilise her MAP?";
  const themes = [
    { c:'t1', name:'1 · ICU Monitor', tag:'(current)', desc:'Dark vitals-monitor aesthetic, teal accents, heart-rate pulse logo. Clinical and focused.', use:'Best for: ICU/critical-care feel, low-light rooms.' },
    { c:'t2', name:'2 · Clean Clinical Light', desc:'Bright hospital-EMR look, blue accent, high contrast. Familiar and accessible.', use:'Best for: daytime sessions, projector-friendly, accessibility.' },
    { c:'t3', name:'3 · Terminal / Code-Crack', desc:'Black screen, green monospace, “> ” prompts. Leans into the hacking/breakout theme.', use:'Best for: a playful, puzzle-forward escape-room vibe.' },
    { c:'t4', name:'4 · Cinematic Dark', desc:'Full-bleed gradient, oversized headings, dramatic glow. High-impact and modern.', use:'Best for: launch/marketing wow, big-screen facilitation.' },
    { c:'t5', name:'5 · Vault / Safecracker', desc:'Navy + brass dial lock, tactile combination-lock motif. Escape-room storytelling.', use:'Best for: emphasising the “unlock” mechanic.' },
    { c:'t6', name:'6 · Arcade / Gamified', desc:'Neon, bold outlines, badge pills, chunky buttons. Energetic and fun.', use:'Best for: younger cohorts, team competition energy.' },
    { c:'t7', name:'7 · Minimal Mono', desc:'Lots of whitespace, single black accent, editorial type. Calm and premium.', use:'Best for: a clean, distraction-free, “serious” tone.' },
    { c:'t8', name:'8 · Level Board / Kanban', desc:'Levels as columns, locks as cards that flip from open→solved. Shows whole-game progress.', use:'Best for: tracking progress across all 10 locks at a glance.' },
    { c:'t9', name:'9 · Glassmorphism', desc:'Frosted glass panels over a vivid gradient. Trendy and soft.', use:'Best for: a contemporary, app-store-modern look.' },
    { c:'t10', name:'10 · Medical Chart / Paper', desc:'Warm paper, serif type, chart-style cards. Storybook clinical realism.', use:'Best for: a narrative, case-study atmosphere.' },
  ];

  function mock(t){
    if (t.c === 't8') {
      return `
      <div class="mock">
        <div class="bar">
          <div class="logo"><span class="dot">＋</span> Vasoactive Breakout</div>
          <div class="hearts">❤❤❤</div>
        </div>
        <div class="body">
          <div class="eye">Progress · Lock 5 of 10</div>
          <div class="cols">
            <div class="col"><h4>L1 · Post-Op</h4><div class="lk done">1.1 ✓ Metaraminol</div><div class="lk done">1.2 ✓ Alpha-1</div><div class="lk done">1.3 ✓ Stop</div><div class="lk done">1.4 ✓ 65</div></div>
            <div class="col"><h4>L2 · Sepsis</h4><div class="lk cur">2.1 🔒 Second-line</div><div class="lk">2.2 🔒 Lactate</div><div class="lk">2.3 🔒 Swap</div></div>
            <div class="col"><h4>L3 · Cardiac</h4><div class="lk">3.1 🔒</div><div class="lk">3.2 🔒</div></div>
          </div>
        </div>
      </div>`;
    }
    const dial = t.c === 't5' ? '<div class="dialwrap"><div class="dial"></div><div style="flex:1">' : '<div>';
    const dialEnd = t.c === 't5' ? '</div></div>' : '</div>';
    return `
    <div class="mock">
      <div class="bar">
        <div class="logo"><span class="dot">＋</span> Vasoactive Breakout</div>
        <div class="hearts">❤❤❤</div>
      </div>
      <div class="body">
        <div class="eye">Level 1 · Lock 1.1 — First-Line Choice</div>
        <div class="card">
          ${dial}
            <div class="h2">The First-Line Choice</div>
            <div class="vig" style="margin-top:6px">${VIG}</div>
          ${dialEnd}
        </div>
        <div class="field">
          <div class="inp">Type the code…</div>
          <div class="btn">Unlock</div>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('grid').innerHTML = themes.map(t => `
    <div class="tile ${t.c}">
      <div class="frame">${mock(t)}</div>
      <div class="cap">
        <div class="n">${t.name} ${t.tag?('<b>'+t.tag+'</b>'):''}</div>
        <div class="d">${t.desc}</div>
        <div class="u">${t.use}</div>
      </div>
    </div>`).join('');
</script>
</body>
</html>
